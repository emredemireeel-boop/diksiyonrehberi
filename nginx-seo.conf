# ═══════════════════════════════════════════════════════════════════════════
# Diksiyon Rehberi — Nginx SEO Konfigürasyonu
# Dosya: /etc/nginx/sites-available/diksiyonrehberi.com
#
# Kurulum:
#   sudo cp nginx-seo.conf /etc/nginx/sites-available/diksiyonrehberi.com
#   sudo ln -s /etc/nginx/sites-available/diksiyonrehberi.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════════

# ── 1. HTTP → HTTPS Yönlendirmesi (301) ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name diksiyonrehberi.com www.diksiyonrehberi.com;

    # Let's Encrypt doğrulama için (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Geri kalan her şeyi HTTPS'e yönlendir
    location / {
        return 301 https://www.diksiyonrehberi.com$request_uri;
    }
}

# ── 2. HTTPS — non-www → www Yönlendirmesi (301) ──────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name diksiyonrehberi.com;

    ssl_certificate     /etc/letsencrypt/live/diksiyonrehberi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diksiyonrehberi.com/privkey.pem;

    # www olmayan tüm istekleri www'ye yönlendir
    return 301 https://www.diksiyonrehberi.com$request_uri;
}

# ── 3. Ana Sunucu — www.diksiyonrehberi.com ────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.diksiyonrehberi.com;

    # ── SSL Sertifikaları (Let's Encrypt) ──────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/diksiyonrehberi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/diksiyonrehberi.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/diksiyonrehberi.com/chain.pem;

    # ── SSL Güvenlik Ayarları ───────────────────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Güvenlik Headers ────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "microphone=(), camera=()" always;

    # ── Gzip Sıkıştırma ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Eski /?blog=slug URL'lerini /blog/slug'a 301 Yönlendir ─────────────
    # NOT: Bu, sosyal medyada paylaşılmış eski linklerin çalışmaya devam
    #      etmesini sağlar. Node.js'de de aynı redirect var (çift güvence).
    if ($args ~* "^blog=(.+)$") {
        set $blog_slug $1;
        return 301 https://www.diksiyonrehberi.com/blog/$blog_slug;
    }

    # ── Statik Dosyalar — Uzun Süreli Cache ────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Statik dosyalar için uzun cache
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── /sitemap.xml — Canonical Header + Cache ─────────────────────────────
    location = /sitemap.xml {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "application/xml; charset=utf-8";
    }

    # ── /robots.txt ─────────────────────────────────────────────────────────
    location = /robots.txt {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=86400";
    }

    # ── /blog/:slug — Canonical Header basımı ───────────────────────────────
    # Google hem <link rel="canonical"> hem de Link HTTP header'ını okur.
    # Bu ikili güvence, hangi URL'in "asıl" olduğunu netleştirir.
    location ~ ^/blog/(.+)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Canonical'ı HTTP header olarak da ekle
        add_header Link "<https://www.diksiyonrehberi.com/blog/$1>; rel=\"canonical\"" always;
        add_header Cache-Control "public, max-age=300";
    }

    # ── Ana Sayfa ve SPA Fallback ────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Canonical header Express tarafından dinamik olarak eklenir
        add_header Cache-Control "public, max-age=60";
    }

    # ── Loglama ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/diksiyonrehberi.access.log;
    error_log  /var/log/nginx/diksiyonrehberi.error.log;
}
