<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="mic" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Glow effect behind mic -->
  <ellipse cx="256" cy="230" rx="80" ry="80" fill="#6366f1" opacity="0.15" filter="url(#glow)"/>
  <!-- Microphone body -->
  <rect x="196" y="120" width="120" height="180" rx="60" fill="url(#mic)"/>
  <!-- Microphone stand arm -->
  <path d="M 256 330 Q 256 380 256 390" stroke="#818cf8" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Stand base -->
  <line x1="206" y1="390" x2="306" y2="390" stroke="#818cf8" stroke-width="14" stroke-linecap="round"/>
  <!-- Microphone arc stand -->
  <path d="M 156 270 Q 156 360 256 360 Q 356 360 356 270" stroke="#818cf8" stroke-width="14" stroke-linecap="round" fill="none"/>
  <!-- Highlight stripe on mic -->
  <rect x="220" y="148" width="20" height="60" rx="10" fill="white" opacity="0.25"/>
</svg>
